server {
    listen 80;
    server_name ltp.test;
    root /Users/reed/Herd/ltp;

    index index.php;

    charset utf-8;

    # Logging
    access_log off;
    error_log /dev/null;

    # Remove trailing slash
    rewrite ^/(.*)/$ /$1 permanent;

    location / {
        # Try static files first, then route to index.php
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Serve robots.txt directly
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # Handle PHP files
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
