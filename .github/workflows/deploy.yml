name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/leadstoprofit
            # On your server
            git remote set-url origin https://reediredale:${{ secrets.GH_TOKEN }}@github.com/reediredale/ltp-php.git
            git fetch origin main
            git reset --hard origin/main